global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'lancamentos-api'
    static_configs:
      - targets: ['lancamentos-api:8080']
    metrics_path: /metrics

  - job_name: 'consolidado-api'
    static_configs:
      - targets: ['consolidado-api:8080']
    metrics_path: /metrics

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
