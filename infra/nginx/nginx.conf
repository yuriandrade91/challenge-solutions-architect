events {
    worker_connections 1024;
}

http {
    upstream lancamentos_api {
        server lancamentos-api:8080;
    }

    upstream consolidado_api {
        server consolidado-api:8080;
    }

    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=100r/s;

    server {
        listen 80;

        location /lancamentos/ {
            limit_req zone=api_zone burst=200 nodelay;
            proxy_pass http://lancamentos_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /consolidado/ {
            limit_req zone=api_zone burst=100 nodelay;
            proxy_pass http://consolidado_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /health/lancamentos {
            proxy_pass http://lancamentos_api/health;
        }

        location /health/consolidado {
            proxy_pass http://consolidado_api/health;
        }
    }
}
